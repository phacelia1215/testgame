<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>Pixel Survivor MAX</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <main>
    <canvas id="game" aria-label="Pixel Survivor MAX game field"></canvas>
    <section class="hud" aria-live="polite">
      <b id="hp">HP 100</b>
      <b id="lv">Lv 1</b>
      <b id="score">Score 0</b>
      <b id="time">0s</b>
      <b id="combo">Combo x1</b>
      <b id="wave">Wave 1</b>
    </section>
    <section id="upgrade" class="panel hidden" aria-live="assertive"></section>
    <button id="restart">リスタート</button>
    <p>WASD/矢印キー・画面ドラッグで移動。スペース/ダブルタップでダッシュ、Pで一時停止。攻撃は自動です。</p>
  </main>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
